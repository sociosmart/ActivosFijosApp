<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/menu"></ion-back-button>
    </ion-buttons>
    <ion-title>Inventarios</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <!-- 🔽 BOTÓN PRINCIPAL -->
  <div class="p-15">
    <ion-button expand="block" color="primary" class="btn-primary" (click)="nuevoInventario()">
      <ion-icon name="add-circle-outline" slot="start"></ion-icon>
      Nuevo Inventario
    </ion-button>
  </div>

  <!-- 📦 LISTA -->
  <ion-list>

    <ion-item *ngFor="let inv of inventarios" lines="none">

      <div class="form-card full-width">

        <!-- 🔹 CLICK GENERAL -->
        <div (click)="irDetalle(inv)">

          <!-- HEADER -->
          <div class="header-card">
            <h2>{{ inv.nombre }}</h2>
            <span class="badge-id">#{{ inv.id }}</span>
          </div>

          <!-- GRID INFO -->
          <div class="info-grid">

            <div class="info-item">
              <ion-icon name="business-outline"></ion-icon>
              <span>{{ inv.empresa }}</span>
            </div>

            <div class="info-item">
              <ion-icon name="stats-chart-outline"></ion-icon>
              <span>{{ inv.cuenta }}</span>
            </div>

            <div class="info-item">
              <ion-icon name="location-outline"></ion-icon>
              <span>{{ inv.ubicacion }}</span>
            </div>

            <div class="info-item">
              <ion-icon name="calendar-outline"></ion-icon>
              <span>{{ inv.fecha | date:'dd/MM/yyyy HH:mm' }}</span>
            </div>

          </div>

        </div>

        <!-- 🔘 ACCIONES -->
        <div class="acciones">

          <ion-button
            
            expand="block"
            [color]="inv.estatus === 'completado' ? 'success' : 'warning'"
            (click)="accionInventario(inv); $event.stopPropagation()"
            class="btn-primary"
          >
            <ion-icon
              [name]="inv.estatus === 'completado' ? 'download-outline' : 'play-outline'"
              slot="start">
            </ion-icon>

            {{ inv.estatus === 'completado' ? 'Descargar' : 'Continuar' }}
          </ion-button>

        </div>

      </div>

    </ion-item>

  </ion-list>

</ion-content>
