<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" (click)="BorrarNumeroARegistrar()"></ion-back-button>
    </ion-buttons>
    <ion-title>Regresar</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-card>
    <ion-card-content>

      <ion-text color="primary">
        <h2 class="ion-text-center" style="font-weight: bold;">
          Registro de cliente
        </h2>
      </ion-text>
      <p class="ion-text-center" style="font-size: 14px;">
        Llene los siguientes campos. Si hay error en la captura manual, haga clic en "Regresar" para capturar de nuevo el número.
      </p>

      <!-- Número de cliente -->
      <ion-label>Numero Cliente</ion-label>
      <ion-input
        type="number"
        [(ngModel)]="Cliente"
        placeholder="0"
        disabled
        class="custom-input bold-text"
      ></ion-input>

      <!-- Correo electrónico -->
        <ion-label>Correo electrónico</ion-label>
        <ion-input
  type="email"
  [(ngModel)]="email"
  placeholder="Correo electrónico del cliente"
  id="email"
  class="custom-input"
  [class.input-invalid]="emailInvalido"
  (ionInput)="validarCambioEmail()"
></ion-input>



      <!-- Botones de dominio de correo -->
      <ion-grid>
        <ion-row>
          <ion-col size="6" size-sm="4" *ngFor="let domain of ['@gmail.com', '@hotmail.com', '@live.com', '@outlook.com', '@', '.com', '.mx']">
            <ion-button expand="block" size="small" color="primary" (click)="Concatena(domain)">
              {{ domain }}
            </ion-button>
          </ion-col>
        </ion-row>
      </ion-grid>

      <!-- Número de empleado -->
  <ion-label># de empleado</ion-label>
 <ion-input
  type="number"
   inputmode="numeric"  
  [(ngModel)]="empleado"
  placeholder="Ingresa tu número de empleado"
  id="empleado"
  class="custom-input"
  [class.input-invalid]="empleadoInvalido"
  (ionInput)="validarCambioEmpleado()"
></ion-input>


      <!-- NIP -->
      <ion-label>NIP</ion-label>
      
<ion-input
    type="tel"
   inputmode="numeric"    
  [(ngModel)]="Nip"
  placeholder="Ingresa tu NIP"
  id="Nip"
  pattern="[0-9]*"
  clearOnEdit="false"
  class="custom-input2"
  [class.input-invalid]="nipInvalido"
  (ionInput)="validarCambioNip()"
></ion-input>

      <!-- Botón de registrar -->
<ion-button type="button" expand="block" color="success" size="large" (click)="Registrar()">
  <ion-icon name="person-add" slot="start"></ion-icon>
  REGISTRAR
</ion-button>

    </ion-card-content>
  </ion-card>
</ion-content>
