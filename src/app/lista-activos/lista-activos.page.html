<ion-header>
  <ion-toolbar color="primary">

    <ion-buttons slot="start">
      <ion-back-button defaultHref="/alta-activo"></ion-back-button>
    </ion-buttons>

    <ion-title>Activos</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="refrescar($event)">
        <ion-icon name="refresh-outline"></ion-icon>
      </ion-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>


<ion-content class="ion-padding fondo">

  <!-- LISTA DE ACTIVOS -->
  <ion-card *ngFor="let activo of activos" class="card-activo">

    <!-- IMAGEN -->
    <div class="img-card-container">
      <ng-container *ngIf="imagenes[activo.id]; else loadingImg">
        <img
          [src]="imagenes[activo.id]"
          (click)="abrirImagen(imagenes[activo.id])"
        />
      </ng-container>

      <ng-template #loadingImg>
        <div class="img-loading">
          <ion-spinner name="crescent"></ion-spinner>
        </div>
      </ng-template>
    </div>

    <!-- INFO -->
    <ion-card-content class="card-content">

      <div class="header-card">
        <h2>{{ activo.nombre }}</h2>
        <span class="badge-id">#{{ activo.id }}</span>
      </div>

      <h3>{{ activo.compania }}</h3>

      <div class="info-item">
        <ion-icon name="location-outline"></ion-icon>
        <span>{{ activo.ubicacion || 'Sin ubicación' }}</span>
      </div>

      <div class="info-item">
        <ion-icon name="calendar-outline"></ion-icon>
        <span>{{ activo.fecha }}</span>
      </div>

    </ion-card-content>

  </ion-card>


  <!-- 🔥 INFINITE SCROLL -->
  <ion-infinite-scroll
    threshold="100px"
    (ionInfinite)="loadMore($event)"
    [disabled]="!hayMas">

    <ion-infinite-scroll-content
      loadingSpinner="crescent"
      loadingText="Cargando más activos...">
    </ion-infinite-scroll-content>

  </ion-infinite-scroll>


  <!-- OPCIONAL: mensaje cuando ya no hay más -->
  <div *ngIf="!hayMas" class="no-mas">
    <p>No hay más activos por mostrar</p>
  </div>

</ion-content>


<!-- MODAL IMAGEN -->
<ion-modal [isOpen]="modalImagenAbierto" (didDismiss)="cerrarImagen()">
  <ng-template>
    <ion-content class="modal-img-wrapper">

      <button class="btn-cerrar" (click)="cerrarImagen()">✕</button>

      <div class="img-container-modal">
        <img [src]="imagenSeleccionada" class="img-full" />
      </div>

    </ion-content>
  </ng-template>
</ion-modal>
