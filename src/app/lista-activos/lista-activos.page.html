<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/menu"></ion-back-button>
    </ion-buttons>
    <ion-title>Activos</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="refrescarManual()">
        <ion-icon name="refresh"></ion-icon>
      </ion-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>

<ion-content>

  <!-- 🔄 PULL TO REFRESH -->
  <ion-refresher slot="fixed" (ionRefresh)="refrescar($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <!-- 📦 LISTA -->
  <ion-list>

    <ion-item *ngFor="let activo of activos">

      <!-- Imagen -->
      <ion-thumbnail slot="start" (click)="abrirImagen(imagenes[activo.id])">
        <ion-img [src]="imagenes[activo.id]"></ion-img>
      </ion-thumbnail>

      <!-- 🔥 TU DISEÑO ORIGINAL -->
      <ion-label>

        <div class="header-card">
          <h2>{{ activo.nombre }}</h2>
          <span class="badge-id">#{{ activo.id }}</span>
        </div>

        <h3>{{ activo.compania }}</h3>

        <div class="info-item">
          <ion-icon name="location-outline"></ion-icon>
          <span>{{ activo.ubicacion || 'Sin ubicación' }}</span>
        </div>

        <div class="info-item">
          <ion-icon name="calendar-outline"></ion-icon>
          <span>{{ activo.fecha }}</span>
        </div>

      </ion-label>

    </ion-item>

  </ion-list>

  <!-- 🔽 BOTÓN SCAN -->
  <div style="text-align: center; padding: 20px;">
    <ion-button expand="block" color="primary" (click)="irEscaner()">
      <ion-icon name="barcode-outline" slot="start"></ion-icon>
      Escanear código de barras
    </ion-button>

    <p style="margin-top:10px; font-size: 12px; color: gray;">
      ¿No encuentras el activo? Escanea su código para obtener información.
    </p>
  </div>

  <!-- 🖼️ MODAL IMAGEN -->
  <ion-modal [isOpen]="modalImagenAbierto">
    <ng-template>
      <ion-content>

        <div style="text-align:center; padding:20px;">
          <img [src]="imagenSeleccionada" style="max-width:100%; border-radius:10px;">
        </div>

        <ion-button expand="block" (click)="cerrarImagen()">
          Cerrar
        </ion-button>

      </ion-content>
    </ng-template>
  </ion-modal>

</ion-content>
