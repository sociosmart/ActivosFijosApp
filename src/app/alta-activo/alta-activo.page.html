<ion-header>
  <ion-toolbar color="primary">

    <ion-buttons slot="start">
      <ion-back-button defaultHref="/menu"></ion-back-button>
    </ion-buttons>

    <ion-title>Alta de Activo</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="abrirConfiguracion()">
        <ion-icon name="settings-outline"></ion-icon>
      </ion-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>

<ion-content>

  <!-- LOADING SOLO SI NO HAY CACHE -->
  <div class="loading-overlay" *ngIf="isLoading">
    <ion-spinner></ion-spinner>
    <p>Cargando catálogos...</p>
  </div>

  <div class="main-container">

    <ion-card class="form-card">

      <ion-card-content>

        <!-- CÓDIGO -->
        <ion-item>
          <ion-label position="stacked">Código</ion-label>

          <div class="input-wrapper">
            <ion-input [(ngModel)]="referencia"></ion-input>

            <ion-icon
              name="scan-outline"
              class="scan-icon-inside"
              (click)="abrirScanner()">
            </ion-icon>
          </div>
        </ion-item>

        <!-- NOMBRE -->
        <ion-item>
          <ion-label position="stacked">Nombre</ion-label>
          <ion-input [(ngModel)]="nombreActivo"></ion-input>
        </ion-item>

        <!-- SELECTS -->
        <ion-item>
          <ion-label position="stacked">Categoría</ion-label>
          <ion-select [(ngModel)]="categoriaId">
            <ion-select-option *ngFor="let cat of categorias" [value]="cat.id">
              {{ cat.name }}
            </ion-select-option>
          </ion-select>
        </ion-item>

        <ion-item>
          <ion-label position="stacked">Compañía</ion-label>
          <ion-select [(ngModel)]="companiaId">
            <ion-select-option *ngFor="let com of companias" [value]="com.id">
              {{ com.name }}
            </ion-select-option>
          </ion-select>
        </ion-item>

        <ion-item>
          <ion-label position="stacked">Analítica</ion-label>
          <ion-select [(ngModel)]="analiticaId">
            <ion-select-option *ngFor="let ana of analiticas" [value]="ana.id">
              {{ ana.name }}
            </ion-select-option>
          </ion-select>
        </ion-item>

        <!-- UBICACIÓN -->
        <ion-item>
          <ion-label position="stacked">Ubicación</ion-label>
          <ion-input [(ngModel)]="ubicacion"></ion-input>
        </ion-item>

        <!-- DESCRIPCIÓN -->
        <ion-item>
          <ion-label position="stacked">Descripción</ion-label>
          <ion-input [(ngModel)]="descripcion"></ion-input>
        </ion-item>

        <!-- VALOR -->
        <ion-item>
          <ion-label position="stacked">Valor</ion-label>
          <ion-input type="number" [(ngModel)]="value"></ion-input>
        </ion-item>

        <!-- FOTO -->
        <ion-button expand="block" (click)="tomarFoto()">📸 Tomar foto</ion-button>

        <div *ngIf="previewImage" class="preview">
          <img [src]="previewImage">
        </div>

        <!-- BOTONES -->
        <ion-button expand="block" (click)="guardarActivoYImprimir()">
          Guardar
        </ion-button>

        <ion-button expand="block" color="warning" (click)="reimprimirTicket()">
          Reimprimir
        </ion-button>

      </ion-card-content>

    </ion-card>

  </div>

</ion-content>
