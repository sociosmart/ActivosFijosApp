<ion-header>
  <ion-toolbar color="primary">
        <ion-buttons slot="start">
      <ion-back-button defaultHref="/menu"></ion-back-button>
    </ion-buttons>
    <ion-title>Alta de Activo</ion-title>

   
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card class="form-card">

    <ion-card-header>
      <ion-card-title>Registro de activo</ion-card-title>
      <ion-card-subtitle>Completa los datos requeridos</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>

      <!-- Code -->
      <ion-item lines="full">
        <ion-label position="stacked">Código</ion-label>
        <ion-input [(ngModel)]="referencia" placeholder=""></ion-input>
      </ion-item>

      <!-- Nombre -->
      <ion-item lines="full">
        <ion-label position="stacked">Nombre *</ion-label>
        <ion-input [(ngModel)]="nombreActivo" placeholder="Ej. Laptop HP"></ion-input>
      </ion-item>

      <!-- Categoría -->
      <ion-item lines="full">
        <ion-label position="stacked">Categoría *</ion-label>

        <ion-select [(ngModel)]="categoriaId" placeholder="Selecciona">
          <ion-select-option 
            *ngFor="let cat of categorias" 
            [value]="cat.id">
            
            {{ cat.name }}
            
          </ion-select-option>
        </ion-select>

      </ion-item>

      <!-- Compañía -->
      <ion-item lines="full">
        <ion-label position="stacked">Compañía *</ion-label>
        <ion-select [(ngModel)]="companiaId" placeholder="Selecciona">
          <ion-select-option 
            *ngFor="let com of companias" 
            [value]="com.id">
            
            {{ com.name }}
            
          </ion-select-option>
        </ion-select>
      </ion-item>

      <!-- Cuentas Analíticas -->
      <ion-item lines="full">
        <ion-label position="stacked">Cuenta analítica / Estación *</ion-label>
        <ion-select [(ngModel)]="analiticaId" placeholder="Selecciona">
          <ion-select-option 
            *ngFor="let ana of analiticas" 
            [value]="ana.id">
            
            {{ ana.name }}
            
          </ion-select-option>
        </ion-select>
      </ion-item>

      


      <!-- Ubicación -->
      <ion-item lines="full">
        <ion-label position="stacked">Ubicación</ion-label>
        <ion-input [(ngModel)]="ubicacion" placeholder="Ej. Oficina 3"></ion-input>
      </ion-item>


      <!-- Descripción -->
      <ion-item lines="full">
        <ion-label position="stacked">Descripción</ion-label>
        <ion-input [(ngModel)]="descripcion" placeholder=""></ion-input>
      </ion-item>


      <!-- Valor -->
      <ion-item lines="full">
        <ion-label position="stacked">Valor</ion-label>
        <ion-input [(ngModel)]="value" placeholder="0"></ion-input>
      </ion-item>

      
      <!-- Foto -->
      <div class="foto-section">
        <ion-button expand="block" color="medium" (click)="tomarFoto()">
          📸 Tomar foto
        </ion-button>

        <div *ngIf="previewImage" class="preview">
          <img [src]="previewImage">
        </div>
      </div>

      <!-- Botones -->
      <div class="buttons">
        <ion-button expand="block" color="primary" (click)="guardarActivoYImprimir()">
          Guardar e Imprimir
        </ion-button>
        <ion-button color="warning" expand="block" (click)="reimprimirTicket()">
  🔁 Reimprimir último ticket
</ion-button>
   
      </div>

    </ion-card-content>
  </ion-card>

</ion-content>
