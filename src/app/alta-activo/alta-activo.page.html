<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Alta de Activo</ion-title>

    <ion-buttons slot="end">
  <ion-button (click)="logout()" color="light">
    <ion-icon name="log-out-outline"></ion-icon>
  </ion-button>
</ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card class="form-card">

    <ion-card-header>
      <ion-card-title>Registro de activo</ion-card-title>
      <ion-card-subtitle>Completa los datos requeridos</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>

      <!-- Nombre -->
      <ion-item lines="full">
        <ion-label position="stacked">Nombre *</ion-label>
        <ion-input [(ngModel)]="nombreActivo" placeholder="Ej. Laptop HP"></ion-input>
      </ion-item>

      <!-- Ubicación -->
      <ion-item lines="full">
        <ion-label position="stacked">Ubicación</ion-label>
        <ion-input [(ngModel)]="ubicacion" placeholder="Ej. Oficina 3"></ion-input>
      </ion-item>

      <!-- Compañía -->
      <ion-item lines="full">
        <ion-label position="stacked">Compañía</ion-label>
        <ion-select [(ngModel)]="compania" placeholder="Selecciona">
          <ion-select-option value="Compania1">Compañía 1</ion-select-option>
          <ion-select-option value="Compania2">Compañía 2</ion-select-option>
        </ion-select>
      </ion-item>

      <!-- Foto -->
      <div class="foto-section">
        <ion-button expand="block" color="medium" (click)="tomarFoto()">
          📸 Tomar foto
        </ion-button>

        <div *ngIf="previewImage" class="preview">
          <img [src]="previewImage">
        </div>
      </div>

      <!-- Botones -->
      <div class="buttons">
        <ion-button expand="block" color="primary" (click)="guardarActivoYImprimir()">
          Guardar e Imprimir
        </ion-button>
        <ion-button color="warning" expand="block" (click)="reimprimirTicket()">
  🔁 Reimprimir último ticket
</ion-button>
      <ion-button expand="block" color="primary" routerLink="/scan-barcode">
  📷 Escanear código de barras
</ion-button>

        <ion-button expand="block" color="secondary" routerLink="/lista-activos">
          Ver Lista de Activos
        </ion-button>
      </div>

    </ion-card-content>
  </ion-card>

</ion-content>
